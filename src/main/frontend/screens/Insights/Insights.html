<div>
    <style>
        .ins-controls { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; margin-bottom: 10px; }
        .ins-section { font-weight: 600; margin: 20px 0 6px; }
        .ins-cards { display: flex; gap: 12px; flex-wrap: wrap; margin-top: 6px; }
        .ins-card { border: 1px solid #d0d7de; border-radius: 8px; padding: 9px 14px; min-width: 110px; }
        .ins-card .n { font-size: 22px; font-weight: 700; }
        .ins-card .l { color: #57606a; font-size: 12px; }
        /* leave breathing room below the last control */
        .ins-bottom-pad { height: 48px; }
    </style>

    <h2 style="margin-top: 0;">Insights</h2>

    <div class="ins-controls">
        <span>Repository:</span>
        <drop-down id="ins-repo" style="width: 240px"></drop-down>
        <span style="margin-left: 12px;">From:</span>
        <date-input id="ins-begin"></date-input>
        <span>To:</span>
        <date-input id="ins-end"></date-input>
        <push-button id="ins-apply">Apply</push-button>
    </div>

    <div class="ins-section">Repository</div>
    <div><text-label id="ins-repo-stats"></text-label></div>

    <div class="ins-section">Activity <text-label id="ins-range-label"></text-label></div>
    <div><text-label id="ins-activity-stats"></text-label></div>

    <div class="ins-section">Branches (<text-label id="ins-branch-count"></text-label>)</div>
    <div id="branches-grid" style="width: 100%; height: 150px;"></div>

    <div class="ins-section">Tags (<text-label id="ins-tag-count"></text-label>)</div>
    <div id="tags-grid" style="width: 100%; height: 150px;"></div>

    <div class="ins-section">Clones (<text-label id="ins-clone-count"></text-label>)</div>
    <div id="clones-grid" style="width: 100%; height: 200px;"></div>

    <div class="ins-bottom-pad"></div>
</div>
