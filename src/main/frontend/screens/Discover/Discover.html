<div class="page-shell wrap-wide discover-page">
    <header class="discover-hero">
        <h1>Explore</h1>
        <div class="lead">Discover public repositories and people using Subversion.</div>
    </header>

    <div class="discover-main">
            <div id="repo-search-toolbar" class="discover-toolbar">
                <div class="discover-filter" id="filter-list" role="tablist" aria-label="Filter results">
                    <push-button id="filter-all" class="discover-filter-opt active">All</push-button>
                    <push-button id="filter-repos" class="discover-filter-opt">Repositories</push-button>
                    <push-button id="filter-people" class="discover-filter-opt">People</push-button>
                </div>
                <div class="discover-search">
                    <search-input id="disc-search" class="discover-search-input" placeholder="Search repositories and people by name, description, or key" clear-label="Clear search"></search-input>
                </div>
            </div>

            <section id="repos-panel" class="ins-section discover-result-section discover-panel discover-section" hidden>
                <button type="button" class="ins-section-head discover-result-head" data-discover-section="repos" aria-expanded="true" aria-controls="repo-results">
                    <span class="ins-section-caret" aria-hidden="true"></span>
                    <span class="discover-result-head-main">
                        <span class="ins-section-title" id="result-title">Repositories</span>
                        <span class="discover-result-actions">
                            <span class="chip chip-copper"><text-label id="repos-count"></text-label></span>
                        </span>
                    </span>
                    <span class="ins-section-note"><text-label id="result-sub"></text-label></span>
                    <span class="ins-section-line" aria-hidden="true"></span>
                </button>
                <div id="repo-results" class="ins-section-body discover-result-body repo-card-list"></div>
            </section>

            <section id="discover-empty" class="discover-empty card card-pad">
                <h2>Search across svn·hub</h2>
                <p>Search for repositories or people to see matching results.</p>
            </section>

            <section id="people-panel" class="ins-section discover-result-section discover-panel discover-people-panel discover-section" hidden>
                <button type="button" id="people-result-head" class="ins-section-head discover-result-head" data-discover-section="people" aria-expanded="true" aria-controls="people-results">
                    <span class="ins-section-caret" aria-hidden="true"></span>
                    <span class="discover-result-head-main">
                        <span class="ins-section-title" id="people-title">People</span>
                        <span class="discover-result-actions">
                            <span class="chip chip-copper"><text-label id="people-count"></text-label></span>
                        </span>
                    </span>
                    <span class="ins-section-note" id="people-subtitle">Find other people using Subversion.</span>
                    <span class="ins-section-line" aria-hidden="true"></span>
                </button>
                <div id="people-results" class="ins-section-body discover-result-body people-card-grid"></div>
                <aside id="people-detail" class="people-detail-panel" hidden></aside>
            </section>
    </div>
</div>
