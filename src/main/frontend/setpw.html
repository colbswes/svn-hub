<div class="auth-shell">
    <aside class="auth-panel">
        <div class="brand">
            <img class="brand-mark" src="assets/svnhub-mark.svg" alt="" aria-hidden="true">
            <span class="wordmark">svn<span class="dot"></span>hub</span>
        </div>

        <div class="auth-copy">
            <div class="eyebrow">Finish reset</div>
            <h1>Set a new password for web and svn access.</h1>
            <p>The temporary code got you signed in. Choose a new password to finish the reset and return to normal sign-in.</p>
        </div>
    </aside>

    <main class="auth-form-wrap">
        <section class="auth-card">
            <div class="eyebrow">New password</div>
            <h1>Set password</h1>
            <p class="muted" style="margin:8px 0 0;">Use at least 6 characters.</p>

            <form class="auth-form" onsubmit="return false;" autocomplete="off">
                <div class="field">
                    <label for="password">New password</label>
                    <text-input id="password" required password autocomplete="new-password"></text-input>
                </div>

                <div class="field">
                    <label for="password2">Confirm</label>
                    <text-input id="password2" required password autocomplete="new-password"></text-input>
                </div>

                <div class="auth-actions">
                    <push-button id="set" class="btn-accent">Set password</push-button>
                    <push-button id="cancel">Cancel</push-button>
                </div>
            </form>
        </section>
    </main>
</div>
