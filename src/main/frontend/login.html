<div class="center">
    <div style="display: inline-block; text-align: center;">
        <h1>SvnHub</h1>
        <div style="margin-bottom: 18px; color: #57606a;">Subversion hosting, with real checkout/update insight</div>

        <div style="margin-bottom: 24px;">
            <push-button id="why-button" style="font-size: 18px; padding: 12px 30px;">Why this service exists</push-button>
        </div>

        <form onsubmit="return false;" autocomplete="on">
            <div style="display: inline-block; width: 100px; text-align: right; margin-right: 10px;">Username:</div>
            <text-input id="username" required autocomplete="username"></text-input>

            <br>

            <div style="display: inline-block; width: 100px; text-align: right; margin-right: 10px;">Password:</div>
            <text-input id="password" style="margin-top: 20px;" required password autocomplete="current-password"></text-input>

            <br>

            <push-button id="login" style="margin-top: 20px;">Login</push-button>
        </form>
        <div style="margin-top: 16px;">
            <push-button id="to-register">Create an account</push-button>
        </div>
        <br><br><br>
        (Default administrator login &mdash; Username: "kiss", Password: "password".)
    </div>
</div>
