<div class="center">
    <div style="display: inline-block; text-align: center; max-width: 500px;">
        <h1>Svn-Hub</h1>
        <div style="margin-bottom: 14px; color: #57606a;">Forgot your password?</div>

        <p style="color:#24292f; line-height:1.55; margin: 0 0 16px;">
            Enter your email address and we'll send you a 6-digit code. For the next
            30 minutes you can sign in with that code in place of your password &mdash;
            then set a new one. Your existing password keeps working the whole time.
        </p>

        <form onsubmit="return false;" autocomplete="off">
            <div style="display:inline-block; width:80px; text-align:right; margin-right:10px;">Email:</div>
            <text-input id="email" required maxlength="255" autocomplete="username"></text-input>
            <br>
            <push-button id="send-code" style="margin-top:20px;">Send code</push-button>
        </form>

        <div style="min-height:22px; margin:16px 0; color:#1a7f37; font-size:14px;">
            <text-label id="sent-msg"></text-label>
        </div>

        <div style="margin-top:8px;">
            <push-button id="to-login">Back to sign in</push-button>
        </div>
    </div>
</div>
