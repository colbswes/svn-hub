# ============================================================================
# SvnHub configuration TEMPLATE
#
# Copy this file to  application.ini  (same directory) and fill in the blanks.
# application.ini holds real secrets and instance paths and is intentionally
# NOT committed to git (it is .gitignored).  This template documents every key
# SvnHub uses, with secrets blank and paths shown as placeholders.
#
# IMPORTANT: empty values MUST be quoted as ""  (a bare  Key =  parses to null
# and aborts startup with a Hashtable NPE -- see AI/KnowledgeBase.md
# "Known Issues").
#
# Optional connection-pool and OAuth 2.1 keys are documented in the Kiss
# framework and are omitted here; add them only if needed.
# ============================================================================

[main]

# ----- Database (PostgreSQL) -----
DatabaseType = PostgreSQL
DatabaseHost = localhost
DatabasePort = 5432
DatabaseName = svnhub
DatabaseUser = svnhub
DatabasePassword = ""

# Max simultaneous REST services; any extra are queued.
MaxWorkerThreads = 30
# Auto-logoff after this many seconds of user inactivity.
UserInactiveSeconds = 900

# ----- SvnHub / svnserve -----
# Root directory svnserve serves (svnserve -r <SvnReposRoot>).  SvnHub creates
# FSFS repositories under here.
SvnReposRoot          = /home/repos
# Directory holding the SvnHub-managed shared svnserve auth files (authz, passwd).
SvnConfDir            = /home/repos/.svnhub-conf
# svnserve operational log (svnserve --log-file <SvnLogFile>) parsed for statistics.
SvnLogFile            = /home/repos/svnserve.log
# Glob (relative to SvnLogFile's directory) matching rotated log siblings.
SvnLogRotateGlob      = svnserve.log.*
# Path prefix stripped from logged paths before deriving the repo key.
SvnLogPathPrefix      = /
# Max log lines ingested per cron tick per file (bounds one transaction).
SvnLogMaxLinesPerRun  = 50000
# SVN identity SvnHub uses to commit approved merges.
SvnServiceUser        = svnhub
SvnServicePassword    = ""
# Base URL shown to users for checkout/clone (svn://host[:port]).
SvnBaseUrl            = svn://localhost:3690

# ----- Email (Postmark) -----
# SvnHub only SENDS email (email-verification and password-reset codes).
# Postmark server "secret" API token (sent as the X-Postmark-Server-Token header).
PostmarkApiToken      = ""
# From address for all outbound mail.  Must be a CONFIRMED Postmark sender
# signature / verified domain, or Postmark rejects the send.
MailFrom              = do_not_reply@svn-hub.com
MailFromName          = Svn-Hub
# Postmark message stream (transactional = "outbound").
MailMessageStream     = outbound
# Set to false to LOG emails to catalina.out instead of sending them (development).
MailEnabled           = true
